name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      ALFRED_KEEP_TEST_LOGS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential man-db python3

      - name: Build
        run: make

      - name: Run official core suite
        run: make test

      - name: Run CLI tests
        run: make test-cli

      - name: Run MVP smoke test
        run: make smoke-mvp

      - name: Run backend diagnostics
        run: make test-backend-diagnostics

      - name: Run JSONL golden tests
        run: make test-jsonl

      - name: Validate compatibility evidence contract
        run: make test-compatibility-evidence

      # Keep this last: test-install deliberately rebuilds the release profile.
      - name: Run staged installation tests
        run: make test-install

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: alfred-test-logs
          if-no-files-found: ignore
          path: |
            tests/core/*.log
            tests/cli/*.log
            tests/backend/*.log
            tests/jsonl/*.log
            tests/jsonl/*.jsonl
            /tmp/alfred_mvp_smoke.*/**
            /tmp/alfred_install_test.*/**
